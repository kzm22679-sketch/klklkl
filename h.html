    <script>
        const STORAGE_KEYS = {
            USERS: 'bmw_users_db',
            CURRENT_USER: 'bmw_current_user',
            MESSAGES: 'bmw_messages_db',
            PROFILE_PICS: 'bmw_profile_pics',
            ARCHIVED: 'bmw_archived_chats'
        };

        function getData(key, defaultValue = {}) {
            return JSON.parse(localStorage.getItem(key) || JSON.stringify(defaultValue));
        }
        function saveData(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }
        function generateId() {
            return 'ID' + Math.random().toString(36).substring(2, 10).toUpperCase();
        }
    </script>

    <script>

        const authError = document.getElementById('authError');

        authForm.addEventListener('submit', function(e) {

                authError.style.display = 'block';

            }

    <!-- 1️⃣6️⃣  JavaScript: إنشاء الحساب (مودال)         -->
    <!-- ============================================ -->
    <script>
        const signupModal = document.getElementById('signupModal');
        const signupForm = document.getElementById('signupForm');
        const signupError = document.getElementById('signupError');

        document.getElementById('openSignupModalBtn').addEventListener('click', () => signupModal.classList.add('active'));
        document.getElementById('closeSignupModal').addEventListener('click', () => signupModal.classList.remove('active'));
        window.addEventListener('click', (e) => { if (e.target === signupModal) signupModal.classList.remove('active'); });

        signupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const credential = document.getElementById('signupCredential').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const dobValue = document.getElementById('dob').value;
            const country = document.getElementById('country').value;

            if (!firstName || !lastName || !credential || !password || !dobValue || !country) {
                signupError.textContent = 'يرجى ملء جميع الحقول';
                signupError.style.display = 'block';
                return;
            }

            const isEmail = credential.includes('@');
            const isValidCred = isEmail ? credential.includes('.') : /^\+?\d{7,15}$/.test(credential);
            if (!isValidCred) {
                signupError.textContent = 'صيغة البريد الإلكتروني أو رقم الهاتف غير صحيحة';
                signupError.style.display = 'block';
                return;
            }

            const birthDate = new Date(dobValue);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
            if (age < 18) {
                signupError.textContent = 'يجب أن يكون عمرك 18 سنة على الأقل';
                signupError.style.display = 'block';
                return;
            }

            const users = getData(STORAGE_KEYS.USERS);
            if (Object.values(users).some(u => u.credential === credential)) {
                signupError.textContent = 'هذا البريد/الهاتف مستخدم بالفعل';
                signupError.style.display = 'block';
                return;
            }

            const id = generateId();
            const newUser = {
                id, name: `${firstName} ${lastName}`, firstName, lastName,
                credential, password, dob: dobValue, country,
                friends: [], groupChats: []
            };
            users[id] = newUser;
            saveData(STORAGE_KEYS.USERS, users);
            saveData(STORAGE_KEYS.CURRENT_USER, newUser);

            signupModal.classList.remove('active');
            signupForm.reset();
            signupError.style.display = 'none';
            switchToMainScreen(newUser);
        });
    </script>

    <!-- 1️⃣7️⃣  JavaScript: إدارة واجهة المستخدم         -->
    <!-- ============================================ -->
    <script>
        let currentUser = getData(STORAGE_KEYS.CURRENT_USER, null);
        let activeFriendId = null;
        let showArchived = false;

        function switchToMainScreen(user) {
            currentUser = user;
            loginScreen.classList.remove('active');
            profileScreen.classList.remove('active');
            mainScreen.classList.add('active');
            updateTopBar();
            renderFriendsList();
            resetChatView();
        }

        function resetChatView() {
            activeFriendId = null;
            document.getElementById('activeChatArea').style.display = 'none';
            document.getElementById('noChatPlaceholder').style.display = 'flex';
        }

        function updateTopBar() {
            if (!currentUser) return;
            document.getElementById('displayName').textContent = currentUser.name;
            document.getElementById('displayId').textContent = currentUser.id;
            const pics = getData(STORAGE_KEYS.PROFILE_PICS, {});
            const pic = pics[currentUser.id];
            const av = document.getElementById('topAvatar');
            if (pic) { av.style.backgroundImage = `url(${pic})`; av.textContent = ''; }
            else { av.style.backgroundImage = ''; av.textContent = currentUser.name.charAt(0); }
        }

        function renderFriendsList() {
            const list = document.getElementById('friendsList');
            list.innerHTML = '';
            if (!currentUser) return;
            const users = getData(STORAGE_KEYS.USERS);
            const archived = getData(STORAGE_KEYS.ARCHIVED, []);
            const friends = currentUser.friends || [];
            const groups = currentUser.groupChats || [];
            let items = [];
            if (showArchived) {
                archived.forEach(a => {
                    if (a.type === 'private') { const f = users[a.id]; if (f) items.push({ ...f, archived: true }); }
                    else { const grp = groups.find(x => x.id === a.id); if (grp) items.push({ ...grp, archived: true, isGroup: true }); }
                });
            } else {
                groups.filter(g => !archived.some(a => a.id === g.id)).forEach(g => items.push({ ...g, isGroup: true }));
                friends.filter(fid => !archived.some(a => a.id === fid)).forEach(fid => { const f = users[fid]; if (f) items.push(f); });
            }
            if (items.length === 0) { list.innerHTML = '<div style="padding:40px;text-align:center;color:#6b6660;">لا توجد محادثات</div>'; return; }
            const pics = getData(STORAGE_KEYS.PROFILE_PICS, {});
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'friend-item' + (activeFriendId === item.id && !item.archived ? ' active' : '');
                const pic = pics[item.id];
                div.innerHTML = `
                    <div class="friend-avatar" style="${pic ? `background-image:url(${pic})` : ''}">${!pic ? (item.name || item.id).charAt(0) : ''}</div>
                    <div class="friend-info">
                        <div class="friend-name">${item.name || item.id} ${item.archived ? '<span style="font-size:0.6rem;background:rgba(201,168,76,0.15);color:#d4b86a;padding:2px 8px;border-radius:10px;">مؤرشفة</span>' : ''}</div>
                        <div class="friend-id">${item.isGroup ? item.members.length + ' أعضاء' : item.id}</div>
                    </div>`;
                if (!item.archived) div.addEventListener('click', () => openChat(item.id));
                list.appendChild(div);
            });
        }

        function openChat(id) {
            activeFriendId = id;
            document.getElementById('noChatPlaceholder').style.display = 'none';
            document.getElementById('activeChatArea').style.display = 'flex';
            const users = getData(STORAGE_KEYS.USERS);
            const friend = users[id];
            const groups = currentUser.groupChats || [];
            const group = groups.find(g => g.id === id);
            document.getElementById('chatTitleSpan').textContent = friend ? friend.name : (group ? group.name : 'محادثة');
            renderMessages();
            renderFriendsList();
        }

        function renderMessages() {
            if (!activeFriendId || !currentUser) return;
            const area = document.getElementById('messagesArea');
            const key = activeFriendId.startsWith('GROUP_') ? activeFriendId : [currentUser.id, activeFriendId].sort().join('_');
            const msgs = getData(STORAGE_KEYS.MESSAGES, {})[key] || [];
            area.innerHTML = msgs.map(m => `<div class="message-bubble ${m.senderId === currentUser.id ? 'sent' : 'received'}">${m.text}</div>`).join('');
            area.scrollTop = area.scrollHeight;
        }

        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const text = document.getElementById('messageInput').value.trim();
            if (!text || !activeFriendId || !currentUser) return;
            const key = activeFriendId.startsWith('GROUP_') ? activeFriendId : [currentUser.id, activeFriendId].sort().join('_');
            const msgs = getData(STORAGE_KEYS.MESSAGES, {});
            if (!msgs[key]) msgs[key] = [];
            msgs[key].push({ senderId: currentUser.id, text, timestamp: Date.now() });
            saveData(STORAGE_KEYS.MESSAGES, msgs);
            document.getElementById('messageInput').value = '';
            renderMessages();
        });

        document.getElementById('tabAllChats').addEventListener('click', function() {
            showArchived = false;
            this.classList.add('active-tab');
            document.getElementById('tabArchivedChats').classList.remove('active-tab');
            renderFriendsList();
        });
        document.getElementById('tabArchivedChats').addEventListener('click', function() {
            showArchived = true;
            this.classList.add('active-tab');
            document.getElementById('tabAllChats').classList.remove('active-tab');
            renderFriendsList();
        });

        window.archiveChat = (id, type) => {
            const archived = getData(STORAGE_KEYS.ARCHIVED, []);
            if (!archived.some(a => a.id === id)) { archived.push({ id, type }); saveData(STORAGE_KEYS.ARCHIVED, archived); }
            renderFriendsList();
        };
        window.unarchiveChat = (id) => {
            let archived = getData(STORAGE_KEYS.ARCHIVED, []);
            archived = archived.filter(a => a.id !== id);
            saveData(STORAGE_KEYS.ARCHIVED, archived);
            renderFriendsList();
        };

        document.getElementById('newChatBtn').addEventListener('click', () => {
            const fid = prompt('أدخل ID المستخدم:');
            const users = getData(STORAGE_KEYS.USERS);
            if (fid && users[fid] && fid !== currentUser.id) {
                if (!currentUser.friends.includes(fid)) { currentUser.friends.push(fid); users[currentUser.id] = currentUser; saveData(STORAGE_KEYS.USERS, users); saveData(STORAGE_KEYS.CURRENT_USER, currentUser); }
                openChat(fid);
                renderFriendsList();
            } else if (fid && !users[fid]) alert('لم يتم العثور على مستخدم');
        });

        document.getElementById('addFriendBtn').addEventListener('click', () => {
            const fid = document.getElementById('friendIdInput').value.trim();
            const users = getData(STORAGE_KEYS.USERS);
            if (!fid || fid === currentUser.id) return alert('خطأ في المعرف');
            if (!users[fid]) return alert('لم يتم العثور على مستخدم');
            if (!currentUser.friends.includes(fid)) {
                currentUser.friends.push(fid);
                users[currentUser.id] = currentUser;
                saveData(STORAGE_KEYS.USERS, users);
                saveData(STORAGE_KEYS.CURRENT_USER, currentUser);
                document.getElementById('friendIdInput').value = '';
                renderFriendsList();
                alert('تمت الإضافة');
            } else alert('موجود بالفعل');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('تسجيل الخروج؟')) {
                currentUser = null; saveData(STORAGE_KEYS.CURRENT_USER, null);
                mainScreen.classList.remove('active'); profileScreen.classList.remove('active');
                loginScreen.classList.add('active'); document.getElementById('authForm').reset(); resetChatView();
            }
        });
    </script>

    <script>
        const profileAvatar = document.getElementById('profileAvatar');
        const profileAvatarText = document.getElementById('profileAvatarText');
        const profilePicUpload = document.getElementById('profilePicUpload');
        const editProfileBtn = document.getElementById('editProfileBtn');
        const saveProfileBtn = document.getElementById('saveProfileBtn');
        const backFromProfileBtn = document.getElementById('backFromProfileBtn');
        const profileError = document.getElementById('profileError');

        // عناصر العرض
        const displayFirstName = document.getElementById('displayFirstName');
        const displayLastName = document.getElementById('displayLastName');
        const displayCredential = document.getElementById('displayCredential');
        const displayDob = document.getElementById('displayDob');
        const displayCountry = document.getElementById('displayCountry');

        // عناصر التحرير
        const editFirstName = document.getElementById('editFirstName');
        const editLastName = document.getElementById('editLastName');
        const editCredential = document.getElementById('editCredential');
        const editDob = document.getElementById('editDob');
        const editCountry = document.getElementById('editCountry');

        let isEditing = false;

        /** فتح صفحة الملف الشخصي */
        function openProfileScreen() {
            if (!currentUser) return;
            populateProfileFields();
            mainScreen.classList.remove('active');
            profileScreen.classList.add('active');
            setEditingMode(false);
            profileError.style.display = 'none';
        }

        /** ملء حقول العرض بالمعلومات الحالية */
        function populateProfileFields() {
            displayFirstName.textContent = currentUser.firstName || '';
            displayLastName.textContent = currentUser.lastName || '';
            displayCredential.textContent = currentUser.credential || '';
            displayDob.textContent = currentUser.dob || '';
            const countryNames = {
                'SA': 'السعودية', 'AE': 'الإمارات', 'EG': 'مصر', 'JO': 'الأردن', 'LB': 'لبنان',
                'IQ': 'العراق', 'KW': 'الكويت', 'QA': 'قطر', 'BH': 'البحرين', 'OM': 'عمان',
                'SY': 'سوريا', 'PS': 'فلسطين', 'LY': 'ليبيا', 'TN': 'تونس', 'DZ': 'الجزائر',
                'MA': 'المغرب', 'SD': 'السودان', 'YE': 'اليمن', 'OTHER': 'أخرى'
            };
            displayCountry.textContent = countryNames[currentUser.country] || currentUser.country || '';

            // تعبئة حقول التحرير مسبقاً
            editFirstName.value = currentUser.firstName || '';
            editLastName.value = currentUser.lastName || '';
            editCredential.value = currentUser.credential || '';
            editDob.value = currentUser.dob || '';
            editCountry.value = currentUser.country || '';

            // الصورة الرمزية
            const pics = getData(STORAGE_KEYS.PROFILE_PICS, {});
            const pic = pics[currentUser.id];
            if (pic) {
                profileAvatar.style.backgroundImage = `url(${pic})`;
                profileAvatarText.textContent = '';
            } else {
                profileAvatar.style.backgroundImage = '';
                profileAvatarText.textContent = currentUser.name.charAt(0);
            }
        }

        /** تبديل وضع التحرير */
        function setEditingMode(editing) {
            isEditing = editing;
            // إظهار/إخفاء العناصر
            displayFirstName.style.display = editing ? 'none' : '';
            editFirstName.style.display = editing ? '' : 'none';
            displayLastName.style.display = editing ? 'none' : '';
            editLastName.style.display = editing ? '' : 'none';
            displayCredential.style.display = editing ? 'none' : '';
            editCredential.style.display = editing ? '' : 'none';
            displayDob.style.display = editing ? 'none' : '';
            editDob.style.display = editing ? '' : 'none';
            displayCountry.style.display = editing ? 'none' : '';
            editCountry.style.display = editing ? '' : 'none';

            editProfileBtn.style.display = editing ? 'none' : '';
            saveProfileBtn.style.display = editing ? '' : 'none';
        }

        /** حفظ التعديلات */
        function saveProfileChanges() {
            const newFirstName = editFirstName.value.trim();
            const newLastName = editLastName.value.trim();
            const newCredential = editCredential.value.trim();
            const newDob = editDob.value;
            const newCountry = editCountry.value;

            if (!newFirstName || !newLastName || !newCredential || !newDob || !newCountry) {
                profileError.textContent = 'يرجى ملء جميع الحقول';
                profileError.style.display = 'block';
                return;
            }

            const isEmail = newCredential.includes('@');
            const isValidCred = isEmail ? newCredential.includes('.') : /^\+?\d{7,15}$/.test(newCredential);
            if (!isValidCred) {
                profileError.textContent = 'صيغة البريد/الهاتف غير صحيحة';
                profileError.style.display = 'block';
                return;
            }

            // التحقق من عدم وجود نفس البريد/الهاتف لمستخدم آخر
            const users = getData(STORAGE_KEYS.USERS);
            const existingUser = Object.values(users).find(u => u.id !== currentUser.id && u.credential === newCredential);
            if (existingUser) {
                profileError.textContent = 'هذا البريد/الهاتف مستخدم من قبل شخص آخر';
                profileError.style.display = 'block';
                return;
            }

            // تحديث بيانات المستخدم
            currentUser.firstName = newFirstName;
            currentUser.lastName = newLastName;
            currentUser.name = `${newFirstName} ${newLastName}`;
            currentUser.credential = newCredential;
            currentUser.dob = newDob;
            currentUser.country = newCountry;

            users[currentUser.id] = currentUser;
            saveData(STORAGE_KEYS.USERS, users);
            saveData(STORAGE_KEYS.CURRENT_USER, currentUser);

            // تحديث العرض
            populateProfileFields();
            updateTopBar();
            setEditingMode(false);
            profileError.style.display = 'none';
        }

        // رفع صورة الملف الشخصي
        profilePicUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                const pics = getData(STORAGE_KEYS.PROFILE_PICS, {});
                pics[currentUser.id] = dataUrl;
                saveData(STORAGE_KEYS.PROFILE_PICS, pics);
                profileAvatar.style.backgroundImage = `url(${dataUrl})`;
                profileAvatarText.textContent = '';
                updateTopBar();
            };
            reader.readAsDataURL(file);
        });

        // أزرار التحكم
        editProfileBtn.addEventListener('click', () => setEditingMode(true));
        saveProfileBtn.addEventListener('click', saveProfileChanges);
        backFromProfileBtn.addEventListener('click', () => {
            profileScreen.classList.remove('active');
            mainScreen.classList.add('active');
        });

        // تعديل زر الملف الشخصي في الشريط العلوي
        document.getElementById('profileBtn').addEventListener('click', openProfileScreen);
    </script>
